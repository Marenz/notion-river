# notion-river configuration
# Place this at ~/.config/notion-river/config.toml

[general]
# Use physical key positions (layout index 0) instead of logical keysyms.
# This makes keybindings work identically across keyboard layouts (e.g. Neo, Dvorak).
physical_keys = true
physical_layout_index = 0

# Default split ratio for new splits.
default_split_ratio = 0.5

# Gap between frames in pixels.
gap = 4

# Border width in pixels.
border_width = 2

[commands]
terminal = "contour"
launcher = ["rofi", "-show", "combi"]

# Choose keybinding profile: "i3_neo" or "notion"
active_profile = "i3_neo"

[appearance]
# Window border colors (sent to River compositor)
active_border = "#9b8ec4"
inactive_border = "#2a2636"
empty_border = "#5e5775"
urgent_border = "#c45b84"

# Tab bar colors
tab_active = "#7c6f9b"             # active tab bg (unfocused frame)
tab_focused_active = "#9b8ec4"     # active tab bg (focused frame)
tab_inactive = "#1e1b26"           # inactive tab bg
tab_separator = "#5e5775"          # separator between tabs
tab_underline_focused = "#cdb4ff"  # active tab underline (focused)
tab_underline_unfocused = "#7c6f9b" # active tab underline (unfocused)
tab_text_active = "#ede8f5"        # active tab text
tab_text_inactive = "#8a8399"      # inactive tab text

# Empty frame indicator colors
empty_focused = "#7c6f9b"
empty_unfocused = "#332e42"

# Waybar workspace indicator colors (per-monitor, cycles if >4 monitors)
monitor_colors = ["#b4a0e5", "#a6c9a1", "#e5cfa6", "#d68ba8"]
waybar_focused_bg = "#2a2636"

# ── Workspaces ──────────────────────────────────────────────────────────
# Each workspace has a name, optional preferred output, and optional initial layout.
# initial_layout: "hsplit" (side-by-side) or "vsplit" (stacked) or omit for single frame.

[[workspaces]]
name = "main"
output = "HDMI-0"
initial_layout = "hsplit"

[[workspaces]]
name = "secondary"
output = "HDMI-0"

[[workspaces]]
name = "utility"
output = "HDMI-0"

[[workspaces]]
name = "steam-games"
output = "HDMI-0"

[[workspaces]]
name = "social"
output = "DP-0"

[[workspaces]]
name = "work"
output = "DP-0"

[[workspaces]]
name = "term"
output = "DP-0"

# ── Window Rules (winprops) ─────────────────────────────────────────────
# Route windows to specific workspaces or frames based on app_id/title patterns.

[[winprops]]
app_id = "telegramdesktop"
workspace = "social"

[[winprops]]
app_id = "vivaldi.*"
workspace = "main"

[[winprops]]
app_id = "discord"
workspace = "social"

[[winprops]]
app_id = "keepassxc"
workspace = "utility"

[[winprops]]
app_id = "thunderbird.*"
workspace = "utility"

[[winprops]]
app_id = "steam_app_.*"
floating = true

# ── Custom Keybinding Profile ────────────────────────────────────────────
# Uncomment and modify to define your own keybinding profile.
# Set active_profile = "custom" above to use it.
#
# [profiles.custom]
# [[profiles.custom.bindings]]
# modifiers = "super"
# key = "Return"
# action = "spawn_terminal"
#
# [[profiles.custom.bindings]]
# modifiers = "super"
# key = "c"
# action = "close"
